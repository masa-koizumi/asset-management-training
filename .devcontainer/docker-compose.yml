version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      - db

db:
  image: postgres:15
  restart: always
  environment:
    POSTGRES_USER: training
    POSTGRES_PASSWORD: training
    POSTGRES_DB: assetdb
  ports:
    - "5432:5432"
  volumes:
    - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql
